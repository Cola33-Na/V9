<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKPL 圖書查詢系統 API 版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .input-wrapper {
            flex: 1;
            min-width: 200px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .settings {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #6c757d;
        }
        
        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .setting-item input {
            width: 80px;
            padding: 6px 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }
        
        .content {
            padding: 30px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #e3f2fd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #1976d2;
        }
        
        .status-bar.error {
            background: #ffebee;
            color: #c62828;
        }
        
        .status-bar.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .book-info {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
        }
        
        .book-info h2 {
            color: #e65100;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 12px;
            color: #757575;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 15px;
            color: #212121;
            font-weight: 500;
            word-break: break-word;
        }
        
        .libraries-section {
            margin-top: 25px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-primary {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .badge-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        .status-available {
            color: #2e7d32;
            font-weight: 600;
        }
        
        .status-unavailable {
            color: #c62828;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #757575;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9e9e9e;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #263238;
            color: #aed581;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
        }
        
        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }
            
            .btn-group {
                width: 100%;
            }
            
            button {
                width: 100%;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 HKPL 圖書查詢系統</h1>
            <p>API 直接查詢版本 | 無需寫入工作表 | 即時回傳結果</p>
        </div>
        
        <div class="controls">
            <div class="input-group">
                <div class="input-wrapper">
                    <label for="searchInput">搜尋書名 / 編號（對應 RawData A欄）</label>
                    <input type="text" id="searchInput" placeholder="輸入書名或編號..." autocomplete="off">
                </div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="searchBook()" id="searchBtn">
                        🔍 查詢
                    </button>
                    <button class="btn-secondary" onclick="clearResults()">
                        清除
                    </button>
                </div>
            </div>
            
            <div class="settings">
                <div class="setting-item">
                    <label for="displayLimit">顯示數量限制 (F1):</label>
                    <input type="number" id="displayLimit" value="100" min="1" max="500">
                </div>
                <div class="setting-item">
                    <label for="locationFilter">指定位置:</label>
                    <input type="text" id="locationFilter" placeholder="選填">
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="useCache" checked> 使用快取
                    </label>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div id="statusBar" style="display: none;"></div>
            
            <div id="results">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <p>輸入書名或編號開始查詢</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= 設定 =================
        // 請替換為您的 GAS Web App URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbzl-HifsUB1oZqmtQPLjG0fYCrxZQYTiEWTC5UzftyAhKTj_Ns3BpqavhGFjaHMrRAi/exec';
        
        // ================= 核心功能 =================
        
        async function searchBook() {
            const input = document.getElementById('searchInput').value.trim();
            const limit = document.getElementById('displayLimit').value;
            const location = document.getElementById('locationFilter').value;
            const btn = document.getElementById('searchBtn');
            const resultsDiv = document.getElementById('results');
            const statusBar = document.getElementById('statusBar');
            
            if (!input) {
                showStatus('請輸入搜尋內容', 'error');
                return;
            }
            
            // 載入狀態
            btn.disabled = true;
            btn.textContent = '查詢中...';
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在查詢資料...</p></div>';
            showStatus('查詢進行中...', 'info');
            
            try {
                // 構建 URL（使用 JSONP 避免 CORS 問題）
                const timestamp = new Date().getTime();
                const callbackName = 'handleResponse_' + timestamp;
                
                const url = `${API_URL}?action=query&input=${encodeURIComponent(input)}&limit=${limit}&location=${encodeURIComponent(location)}&callback=${callbackName}&_=${timestamp}`;
                
                // 使用 JSONP
                const data = await fetchJSONP(url, callbackName);
                
                if (data.success && data.found) {
                    displayResults(data);
                    showStatus(`查詢成功！耗時 ${data.elapsedSeconds?.toFixed(2) || '?'} 秒 | ExecID: ${data.execId}`, 'success');
                } else if (data.success && !data.found) {
                    resultsDiv.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="7" y1="7" x2="15" y2="15"></line>
                                <line x1="15" y1="7" x2="7" y2="15"></line>
                            </svg>
                            <p>找不到「${escapeHtml(input)}」的相關資料</p>
                        </div>
                    `;
                    showStatus('查無資料', 'error');
                } else {
                    throw new Error(data.error || '未知錯誤');
                }
                
            } catch (error) {
                console.error('查詢錯誤:', error);
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p>查詢失敗: ${escapeHtml(error.message)}</p>
                    </div>
                `;
                showStatus('查詢失敗: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 查詢';
            }
        }
        
        // JSONP 請求封裝
        function fetchJSONP(url, callbackName) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const timeout = setTimeout(() => {
                    cleanup();
                    reject(new Error('請求超時'));
                }, 30000);
                
                function cleanup() {
                    clearTimeout(timeout);
                    if (script.parentNode) script.parentNode.removeChild(script);
                    delete window[callbackName];
                }
                
                window[callbackName] = (data) => {
                    cleanup();
                    resolve(data);
                };
                
                script.onerror = () => {
                    cleanup();
                    reject(new Error('載入失敗'));
                };
                
                script.src = url;
                document.head.appendChild(script);
            });
        }
        
        // 顯示查詢結果
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const book = data.bookInfo;
            const libs = data.libraries;
            
            let html = '';
            
            // 書籍基本資訊
            html += `
                <div class="book-info">
                    <h2>📖 ${escapeHtml(book.title) || '未知書名'}</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">館藏編目號碼</span>
                            <span class="info-value">${escapeHtml(book.catalogNo) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">索書號</span>
                            <span class="info-value">${escapeHtml(book.callNo) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">著者</span>
                            <span class="info-value">${escapeHtml(book.author) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">出版者</span>
                            <span class="info-value">${escapeHtml(book.publisher) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">出版年份</span>
                            <span class="info-value">${escapeHtml(book.pubYear) || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">出版地</span>
                            <span class="info-value">${escapeHtml(book.pubLoc) || '-'}</span>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <span class="info-label">著錄</span>
                            <span class="info-value">${escapeHtml(book.description) || '-'}</span>
                        </div>
                        ${book.series ? `
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <span class="info-label">叢書名</span>
                            <span class="info-value">${escapeHtml(book.series)}</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            // 圖書館列表
            if (libs && libs.list && libs.list.length > 0) {
                html += `
                    <div class="libraries-section">
                        <div class="section-header">
                            <div>
                                <span class="section-title">🏛️ 圖書館館藏分佈</span>
                                <span class="badge badge-primary" style="margin-left: 10px;">
                                    顯示 ${libs.displayed} / ${libs.total} 間
                                </span>
                                ${data.fromCache ? '<span class="badge badge-success" style="margin-left: 5px;">快取</span>' : ''}
                            </div>
                        </div>
                `;
                
                if (libs.hasMore) {
                    html += `<div style="margin-bottom: 15px; color: #666; font-size: 14px;">
                        ⚠️ 還有 ${libs.total - libs.displayed} 間圖書館未顯示，可增加「顯示數量限制」查看全部
                    </div>`;
                }
                
                html += `
                    <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>圖書館</th>
                                <th>索書號</th>
                                <th>期次</th>
                                <th>媒體碼</th>
                                <th>館藏現況</th>
                                <th>館藏</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                libs.list.forEach(lib => {
                    const statusClass = lib.status && lib.status.includes('可供借出') ? 'status-available' : 'status-unavailable';
                    html += `
                        <tr>
                            <td><strong>${escapeHtml(lib.library)}</strong></td>
                            <td>${escapeHtml(lib.callNumber)}</td>
                            <td>${escapeHtml(lib.issue) || '-'}</td>
                            <td>${escapeHtml(lib.mediaCode) || '-'}</td>
                            <td class="${statusClass}">${escapeHtml(lib.status) || '-'}</td>
                            <td>${escapeHtml(lib.collection) || '-'}</td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table></div></div>';
            } else {
                html += '<div style="padding: 20px; text-align: center; color: #666;">暫無圖書館館藏資料</div>';
            }
            
            // 除錯資訊（可選）
            if (data.execId) {
                html += `
                    <div class="debug-info">
                        <div><strong>執行 ID:</strong> ${data.execId}</div>
                        <div><strong>書籍 ID:</strong> ${data.bookId}</div>
                        <div><strong>位置:</strong> ${data.location || '未指定'}</div>
                        <div><strong>耗時:</strong> ${data.elapsedSeconds?.toFixed(3)} 秒</div>
                        <div><strong>分類建議:</strong> ${data.classification?.suggestedCategory} (${data.classification?.totalCount} 間)</div>
                    </div>
                `;
            }
            
            resultsDiv.innerHTML = html;
        }
        
        // 顯示狀態訊息
        function showStatus(message, type) {
            const statusBar = document.getElementById('statusBar');
            statusBar.style.display = 'block';
            statusBar.className = 'status-bar ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
            statusBar.textContent = message;
        }
        
        // 清除結果
        function clearResults() {
            document.getElementById('searchInput').value = '';
            document.getElementById('results').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <p>輸入書名或編號開始查詢</p>
                </div>
            `;
            document.getElementById('statusBar').style.display = 'none';
        }
        
        // HTML 跳脫
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 支援 Enter 鍵查詢
        document.getElementById('searchInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchBook();
        });
    </script>
</body>
</html>
